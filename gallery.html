<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gallery | EverSeasons</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header (reuse your same header/nav markup) -->
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img class="brand-logo" src="everseasonslogo.jpg" alt="EverSeasons" />
      </a>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="index.html#faqs">FAQs</a>
        <a href="index.html#contact">Contact</a>
      </nav>

      <div class="nav-actions">
        <a class="icon-btn" href="#" aria-label="Search"><span class="icon">⌕</span></a>
        <a class="btn btn-gold" href="#contact">Booking</a>
      </div>
    </div>
  </header>

  <main class="section section-dark" style="padding-top:140px;">
    <div class="container">
      <p class="eyebrow">Our Work</p>
      <h1 class="section-title" style="text-transform:uppercase;">Gallery</h1>
      <p class="muted" style="max-width:720px;">
        Before/after projects across window cleaning, gutter cleaning, pressure washing, deck staining, and more.
      </p>

      <div class="gallery-grid">
        <!-- Replace these with your real images/videos -->
        <figure class="work-card">
          <img src="Untitled design (1).mp4" alt="Window Cleaning Project" />
        </figure>

        <figure class="work-card">
          <img src="Screen Shot 2026-03-04 at 2.43.16 AM.png" alt="Gutter Cleaning Project" />
        </figure>

        <figure class="work-card">
          <video class="work-video" autoplay muted loop playsinline>
            <source src="pressurewash.mp4" type="video/mp4" />
          </video>
          <figcaption>Pressure Washing</figcaption>
        </figure>

        <figure class="work-card">
          <img src="hero.jpg" alt="Project" />
          <figcaption>Seasonal Maintenance</figcaption>
        </figure>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">© 2026 EverSeasons.</div>
      <div class="muted">Home Maintenance</div>
    </div>
  </footer>

</body>
</html>
